<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Formeon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      background: #eeece6;
      color: #1c1a16;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #fafaf8;
      border: 1px solid #e8e5df;
      border-radius: 28px;
      padding: 48px 40px 36px;
      box-shadow: 0 24px 64px rgba(35, 32, 26, 0.08);
      text-align: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto;
      display: block;
      mix-blend-mode: multiply;
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      margin: 22px 0 10px;
      letter-spacing: -0.02em;
      color: #23201a;
    }

    .subtitle {
      margin: 0 0 32px;
      font-size: 15px;
      line-height: 1.5;
      color: #6b665c;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-wrap {
      position: relative;
    }

    .btn {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      background: #ffffff;
      border: 1px solid #ddd9d2;
      color: #23201a;
    }

    .btn:hover:not(:disabled) {
      background: #f5f3ef;
      border-color: #cfcac1;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .last-used {
      display: none;
      position: absolute;
      top: -10px;
      right: 16px;
      padding: 3px 10px;
      border-radius: 999px;
      background: #22c55e;
      color: #ffffff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .last-used.visible {
      display: block;
    }

    .error {
      display: none;
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-size: 13px;
      text-align: left;
    }

    .error.visible {
      display: block;
    }

    .legal {
      margin-top: 36px;
      font-size: 13px;
      line-height: 1.55;
      color: #8a857b;
    }

    .legal a {
      color: #6b665c;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .legal a:hover {
      color: #23201a;
    }
  </style>
</head>

<body>
  <div class="card">
    <img class="logo" src="/logos/formeon-logo.png" alt="Formeon" />
    <h1>Welcome to Formeon</h1>
    <p class="subtitle">Choose your work account to get started.</p>

    <div id="error" class="error" role="alert"></div>

    <div class="buttons">
      <div class="btn-wrap">
        <span id="badge-google" class="last-used">Last used</span>
        <button type="button" class="btn" id="btn-google" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          Sign in with Google
        </button>
      </div>

      <div class="btn-wrap">
        <span id="badge-microsoft" class="last-used">Last used</span>
        <button type="button" class="btn" id="btn-microsoft" disabled>
          <svg width="18" height="18" viewBox="0 0 23 23" aria-hidden="true">
            <path fill="#f25022" d="M0 0h11v11H0z" />
            <path fill="#7fba00" d="M12 0h11v11H12z" />
            <path fill="#00a4ef" d="M0 12h11v11H0z" />
            <path fill="#ffb900" d="M12 12h11v11H12z" />
          </svg>
          Sign in with Microsoft
        </button>
      </div>

      <div class="btn-wrap">
        <span id="badge-sso" class="last-used">Last used</span>
        <button type="button" class="btn" id="btn-sso" disabled>Sign in with SSO</button>
      </div>
    </div>

    <p class="legal">
      By continuing, you agree to the
      <a href="https://formeon.org/terms" target="_blank" rel="noopener noreferrer">Terms of Service</a>
      and
      <a href="https://formeon.org/privacy" target="_blank" rel="noopener noreferrer">Privacy Policy</a>.
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth/login-config.js"></script>
  <script>
    (function () {
      var LAST_PROVIDER_KEY = 'formeon_last_auth_provider';
      var params = new URLSearchParams(window.location.search);
      var defaultCallback = window.location.origin + '/auth/desktop-callback.html';
      var redirectTo = params.get('redirect_uri') || defaultCallback;
      var errorEl = document.getElementById('error');
      var btnGoogle = document.getElementById('btn-google');
      var btnMicrosoft = document.getElementById('btn-microsoft');
      var btnSso = document.getElementById('btn-sso');

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
      }

      function setLoading(loading) {
        btnGoogle.disabled = loading;
        btnMicrosoft.disabled = loading;
        btnSso.disabled = loading;
      }

      function markLastUsed(provider) {
        try { localStorage.setItem(LAST_PROVIDER_KEY, provider); } catch (_) { }
      }

      function showLastUsedBadge() {
        var last = null;
        try { last = localStorage.getItem(LAST_PROVIDER_KEY); } catch (_) { }
        ['google', 'microsoft', 'sso'].forEach(function (id) {
          var badge = document.getElementById('badge-' + id);
          if (badge) badge.classList.toggle('visible', last === id);
        });
      }

      function init() {
        showLastUsedBadge();
        var cfg = window.FORMEON_AUTH_CONFIG;
        if (!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey) {
          showError('Sign-in is not configured. Missing Supabase config on this page.');
          return;
        }
        var supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
          auth: { flowType: 'pkce', detectSessionInUrl: false, persistSession: true, storage: window.localStorage },
        });
        btnGoogle.disabled = false;
        btnMicrosoft.disabled = false;
        btnSso.disabled = false;

        async function startOAuth(provider) {
          markLastUsed(provider === 'azure' ? 'microsoft' : provider);
          setLoading(true);
          errorEl.classList.remove('visible');
          try {
            var options = { redirectTo: redirectTo, skipBrowserRedirect: false };
            if (provider === 'azure') {
              options.scopes = 'email openid profile User.Read';
            } else if (provider === 'google') {
              // Sign-in requests only identity scopes. Google Calendar
              // access is granted separately via the dedicated Calendar
              // OAuth flow in the app.
              options.scopes = 'openid email profile';
            }
            var result = await supabase.auth.signInWithOAuth({ provider: provider, options: options });
            if (result.error) throw result.error;
            if (result.data && result.data.url) {
              window.location.href = result.data.url;
            }
          } catch (e) {
            showError((e && e.message) || 'Could not start sign-in');
            setLoading(false);
          }
        }

        async function startSSO() {
          var domain = window.prompt('Enter your work email domain (e.g. company.com)');
          if (!domain || !domain.trim()) return;
          markLastUsed('sso');
          setLoading(true);
          errorEl.classList.remove('visible');
          try {
            var result = await supabase.auth.signInWithSSO({
              domain: domain.trim(),
              options: { redirectTo: redirectTo },
            });
            if (result.error) throw result.error;
            if (result.data && result.data.url) {
              window.location.href = result.data.url;
            }
          } catch (e) {
            showError((e && e.message) || 'Could not start SSO sign-in');
            setLoading(false);
          }
        }

        btnGoogle.addEventListener('click', function () { startOAuth('google'); });
        btnMicrosoft.addEventListener('click', function () { startOAuth('azure'); });
        btnSso.addEventListener('click', startSSO);
      }

      if (window.FORMEON_AUTH_CONFIG) {
        init();
      } else {
        var s = document.createElement('script');
        s.src = '/auth/login-config.js';
        s.onload = init;
        s.onerror = function () { showError('Could not load auth configuration.'); };
        document.head.appendChild(s);
      }
    })();
  </script>
</body>

</html>
