<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Formeon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #050505;
      color: #f5f5f5;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 30px 100px rgba(0,0,0,0.8);
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p.sub { color: rgba(255,255,255,0.4); font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.75rem; }
    .err {
      display: none;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 0.75rem;
      color: #fca5a5;
      font-size: 0.75rem;
      text-align: left;
    }
    .err.visible { display: block; }
    button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.9rem 1rem;
      margin-bottom: 0.65rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.08);
      background: #fff;
      color: #111;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    button:hover:not(:disabled) { transform: scale(1.02); }
    button:disabled { opacity: 0.55; cursor: wait; }
    button.ms {
      background: rgba(255,255,255,0.04);
      color: #fff;
      border-color: rgba(255,255,255,0.1);
    }
    button svg { width: 20px; height: 20px; flex-shrink: 0; }
    .spin {
      width: 20px; height: 20px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .foot {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in to Formeon</h1>
    <p class="sub">Connect your account for the desktop app. Sign-in stays on this site (PKCE).</p>
    <div id="error" class="err" role="alert"></div>
    <button type="button" id="google-btn" aria-label="Continue with Google">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span id="google-label">Continue with Google</span>
    </button>
    <button type="button" id="microsoft-btn" class="ms" aria-label="Continue with Microsoft">
      <svg viewBox="0 0 23 23" aria-hidden="true"><path fill="#f35325" d="M1 1h10v10H1z"/><path fill="#81bc06" d="M12 1h10v10H12z"/><path fill="#05a6f0" d="M1 12h10v10H1z"/><path fill="#ffba08" d="M12 12h10v10H12z"/></svg>
      <span id="microsoft-label">Continue with Microsoft</span>
    </button>
    <p class="foot">Formeon · Desktop</p>
  </div>

  <script src="/auth/login-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script>
    (function () {
      var DEFAULT_CALLBACK = 'https://stealthtechnologies.dev/auth/desktop-callback.html';
      var params = new URLSearchParams(window.location.search);
      var redirectUri = params.get('redirect_uri') || DEFAULT_CALLBACK;

      var errEl = document.getElementById('error');
      var googleBtn = document.getElementById('google-btn');
      var microsoftBtn = document.getElementById('microsoft-btn');

      function showError(msg) {
        errEl.textContent = msg;
        errEl.classList.add('visible');
      }

      function setLoading(loading) {
        googleBtn.disabled = loading;
        microsoftBtn.disabled = loading;
        if (loading) {
          document.getElementById('google-label').innerHTML = '<span class="spin"></span>';
          document.getElementById('microsoft-label').textContent = 'Redirecting…';
        }
      }

      var cfg = window.FORMEON_AUTH_CONFIG;
      if (!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey) {
        showError('Auth is not configured. Missing Supabase public keys on this deployment.');
        googleBtn.disabled = true;
        microsoftBtn.disabled = true;
        return;
      }

      var supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
        auth: {
          flowType: 'pkce',
          detectSessionInUrl: false,
          persistSession: true,
          storage: window.localStorage,
          storageKey: 'formeon-desktop-auth',
        },
      });

      async function signIn(provider) {
        setLoading(true);
        errEl.classList.remove('visible');
        var options = { redirectTo: redirectUri };
        if (provider === 'google') {
          options.queryParams = { access_type: 'offline', prompt: 'consent' };
        }
        var result = await supabase.auth.signInWithOAuth({ provider: provider, options: options });
        if (result.error) {
          showError(result.error.message);
          setLoading(false);
        }
      }

      googleBtn.addEventListener('click', function () { signIn('google'); });
      microsoftBtn.addEventListener('click', function () { signIn('azure'); });
    })();
  </script>
</body>
</html>
