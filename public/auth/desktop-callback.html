<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Returning to Formeon…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #334155;
    }

    .card {
      text-align: center;
      padding: 2rem;
      max-width: 360px;
    }

    .error {
      color: #b91c1c;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }

    .error.visible {
      display: block;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth/login-config.js"></script>
</head>

<body>
  <div class="card">
    <p id="msg">Completing sign-in…</p>
    <p id="error" class="error" role="alert"></p>
  </div>
  <script>
    (function () {
      var msg = document.getElementById('msg');
      var errorEl = document.getElementById('error');

      function showError(text) {
        msg.textContent = 'Sign-in could not be completed';
        errorEl.textContent = text;
        errorEl.classList.add('visible');
      }

      function postTokensToApp(tokens) {
        var body = JSON.stringify(tokens);
        function post(host) {
          return fetch('http://' + host + ':47836/auth-callback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: body,
          });
        }
        return post('localhost').catch(function () {
          return post('127.0.0.1');
        });
      }

      function openDeepLink(hashOrQuery) {
        window.location.replace('stealth://auth/callback' + hashOrQuery);
      }

      async function finish(session) {
        if (!session || !session.access_token || !session.refresh_token) {
          showError('No session returned from sign-in.');
          return;
        }
        var tokens = {
          access_token: session.access_token,
          refresh_token: session.refresh_token,
        };
        // Google Calendar access is granted via the dedicated Calendar OAuth
        // flow in the app — sign-in no longer forwards a provider_token.
        var hash = '#' + new URLSearchParams(tokens).toString();

        try {
          await postTokensToApp(tokens);
        } catch (e) {
          console.warn('HTTP callback to app failed (deep link may still work):', e);
        }

        msg.textContent = 'Opening Formeon…';
        openDeepLink(hash);
        setTimeout(function () {
          msg.textContent = 'Return to the Formeon app to continue.';
        }, 2000);
      }

      async function run() {
        var cfg = window.FORMEON_AUTH_CONFIG;
        if (!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey) {
          showError('Auth is not configured on this page.');
          return;
        }

        var hash = window.location.hash || '';
        var search = window.location.search || '';

        if (hash && hash.indexOf('access_token=') !== -1) {
          var hashParams = new URLSearchParams(hash.substring(1));
          await finish({
            access_token: hashParams.get('access_token'),
            refresh_token: hashParams.get('refresh_token'),
          });
          return;
        }

        var queryParams = new URLSearchParams(search.replace(/^\?/, ''));
        var code = queryParams.get('code');
        var err = queryParams.get('error_description') || queryParams.get('error');
        if (err) {
          showError(err);
          return;
        }

        if (code) {
          var supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
            auth: {
              flowType: 'pkce',
              detectSessionInUrl: false,
              persistSession: true,
              storage: window.localStorage,
            },
          });
          var result = await supabase.auth.exchangeCodeForSession(code);
          if (result.error) {
            showError(result.error.message || 'Code exchange failed');
            return;
          }
          await finish(result.data.session);
          return;
        }

        showError('Missing sign-in data. Close this tab and try again from Formeon.');
      }

      run().catch(function (e) {
        showError(e && e.message ? e.message : 'Unexpected error');
      });
    })();
  </script>
</body>

</html>
